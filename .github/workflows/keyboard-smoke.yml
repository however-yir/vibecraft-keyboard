name: keyboard-smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  repo-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run repository checks
        run: ./scripts/check.sh

      - name: Verify key docs exist
        run: |
          test -f docs/hardware-bom.md
          test -f docs/wiring-guide.md
          test -f docs/firmware-build-and-flash.md
          test -f config/default-keymap.env.example
